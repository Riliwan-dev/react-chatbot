<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chatbot</title>
</head>
<body>

  <div id="root"></div>

  <!-- ✅ Official React 18 -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- ✅ Babel (needed to compile JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    function ChatInput() {
      return (
        <>
          <input placeholder="Send a message to Chatbot" size="30"/>
          <button>Send</button>
        </>
      );
    }

    function ChatMessage({message , sender}) {
      // use this 
  
      // const message = props.message;
      // const sender = props.sender;
  
      //       // or this

      // const {message , sender} = props;

      if (sender === 'robot') {
        return(
          <div>
            <img src="img/robot.png" width="50" />
            {message}
          </div >
        );
      }

      return (
        <div>
          {message}
          <img src="img/user.png" width="50" />
        </div >
      );
    }

   function App () {
    return(
      <>
        <ChatInput/>
        <ChatMessage message="hello chatbot" sender="user"/>
        <ChatMessage message="Hello! How can i help you?" sender="robot"/>
        <ChatMessage message="Can you get me today's date?" sender="user"/>
        <ChatMessage message="Today is September 27" sender="robot"/>
      </>
    );
   }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
